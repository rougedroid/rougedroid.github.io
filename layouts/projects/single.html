{{ define "main" }}
<article class="prose max-w-none dark:prose-invert">
  <header class="mb-6">
    <h1 class="text-4xl font-extrabold mb-2 text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
    {{ with .Description }}
      <p class="text-muted-foreground italic text-lg">{{ . }}</p>
    {{ end }}
  </header>

  <!-- Grabs whatever picture you bundled inside the project folder -->
  {{ with .Resources.GetMatch "featured.*" }}
    <div class="my-6">
      <img src="{{ .RelPermalink }}" alt="{{ $.Title }}" class="rounded-lg shadow-md w-full max-h-96 object-cover">
    </div>
  {{ end }}

  <section class="mt-6">
    {{ .Content }}
  </section>
</article>
{{ end }}
